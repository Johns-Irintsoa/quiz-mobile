<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz SGBD Objet Relationnel et SQL3 Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f3f0;
    --card: #ffffff;
    --border: #e8e6e1;
    --text-primary: #1a1917;
    --text-secondary: #6b6860;
    --text-hint: #a09d96;
    --blue: #2a5bd7;
    --blue-light: #eef2fc;
    --blue-mid: #c5d3f5;
    --green: #1a7a4a;
    --green-light: #e8f7ef;
    --green-border: #a3d9bc;
    --red: #b91c1c;
    --red-light: #fef0f0;
    --red-border: #fca5a5;
    --orange: #c2550f;
    --chip-done: #bfdbfe;
    --chip-correct: #bbf7d0;
    --chip-wrong: #fecaca;
    --shadow: 0 2px 8px rgba(0,0,0,0.07), 0 0 1px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.07);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    color: var(--text-primary);
  }

  header {
    width: 100%;
    max-width: 820px;
    margin-bottom: 28px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    line-height: 1.2;
  }
  header p {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 300;
  }

  .card {
    width: 100%;
    max-width: 820px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }

  /* === NAV GRID === */
  .nav-grid-wrap {
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 14px;
    background: #faf9f7;
  }
  .nav-grid-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-hint);
    margin-bottom: 10px;
  }
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(20, 1fr);
    gap: 4px;
  }
  @media (max-width: 640px) {
    .nav-grid { grid-template-columns: repeat(10, 1fr); }
  }
  .nav-chip {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    border-radius: 6px;
    cursor: pointer;
    border: 1.5px solid transparent;
    background: #ede9e3;
    color: var(--text-secondary);
    transition: all 0.15s;
    user-select: none;
    min-width: 0;
  }
  .nav-chip:hover { background: var(--blue-mid); color: var(--blue); border-color: var(--blue-mid); }
  .nav-chip.active { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
  .nav-chip.confirmed { background: var(--chip-done); color: #1d4ed8; border-color: #93c5fd; }
  .nav-chip.confirmed.correct-chip { background: var(--chip-correct); color: var(--green); border-color: var(--green-border); }
  .nav-chip.confirmed.wrong-chip { background: var(--chip-wrong); color: var(--red); border-color: var(--red-border); }

  /* === QUESTION BODY === */
  .q-body {
    padding: 28px 32px 0;
  }
  @media (max-width: 640px) { .q-body { padding: 20px 18px 0; } }

  .q-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .q-num {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    background: var(--blue-light);
    border: 1px solid var(--blue-mid);
    border-radius: 20px;
    padding: 3px 12px;
    white-space: nowrap;
  }
  .q-type-badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-hint);
    background: #f0ede8;
    border-radius: 20px;
    padding: 3px 10px;
    white-space: nowrap;
  }

  .q-text {
    font-size: 15.5px;
    font-weight: 400;
    line-height: 1.65;
    color: var(--text-primary);
    margin-bottom: 22px;
  }
  .q-text .prose-line {
    margin-bottom: 4px;
  }
  .q-text pre.code-block {
    font-family: 'Fira Code', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    background: #f8f6f2;
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue-mid);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 10px 0;
    color: #2d2a26;
    white-space: pre;
  }

  /* === OPTIONS === */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-bottom: 0;
  }

  .option-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    background: #fff;
  }
  .option-item:hover:not(.disabled) {
    border-color: var(--blue-mid);
    background: var(--blue-light);
  }
  .option-item.selected {
    border-color: var(--blue);
    background: var(--blue-light);
  }
  .option-item.correct {
    border-color: var(--green-border);
    background: var(--green-light);
    cursor: default;
  }
  .option-item.wrong {
    border-color: var(--red-border);
    background: var(--red-light);
    cursor: default;
  }
  .option-item.neutral-correct {
    border-color: var(--green-border);
    background: var(--green-light);
    cursor: default;
  }
  .option-item.disabled { cursor: default; }

  .option-letter {
    width: 26px; height: 26px; min-width: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    background: #f0ede8;
    color: var(--text-secondary);
    transition: all 0.15s;
    margin-top: 1px;
  }
  .option-item.selected .option-letter {
    background: var(--blue);
    color: #fff;
  }
  .option-item.correct .option-letter {
    background: var(--green);
    color: #fff;
  }
  .option-item.wrong .option-letter {
    background: var(--red);
    color: #fff;
  }
  .option-item.neutral-correct .option-letter {
    background: var(--green);
    color: #fff;
  }

  .option-text {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--text-primary);
    flex: 1;
  }
  .option-text.code-opt {
    font-family: 'Fira Code', monospace;
    font-size: 12.5px;
    line-height: 1.65;
    word-break: break-all;
  }
  .option-icon {
    font-size: 16px;
    margin-left: 4px;
    margin-top: 3px;
    min-width: 20px;
  }

  /* === FEEDBACK === */
  .feedback-box {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    background: #f8f6f2;
    border: 1px solid var(--border);
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text-secondary);
    display: none;
  }
  .feedback-box.show { display: block; }
  .feedback-box strong { color: var(--text-primary); }

  /* === ACTIONS BAR === */
  .actions-bar {
    padding: 20px 32px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }
  @media (max-width: 640px) { .actions-bar { padding: 16px 18px 20px; } }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-secondary);
  }
  .btn-ghost:hover { background: #f4f3f0; border-color: #c9c5bd; }
  .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary {
    background: var(--blue);
    color: #fff;
    border: 1.5px solid transparent;
  }
  .btn-primary:hover { background: #1e48c4; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-confirm {
    background: var(--text-primary);
    color: #fff;
    border: none;
    flex: 1;
    max-width: 200px;
  }
  .btn-confirm:hover:not(:disabled) { background: #333; }
  .btn-confirm:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-validate {
    background: #15803d;
    color: #fff;
    border: none;
    flex: 1;
    max-width: 220px;
  }
  .btn-validate:hover { background: #166534; }

  .nav-btns { display: flex; gap: 8px; align-items: center; }

  /* === PROGRESS === */
  .progress-bar-wrap {
    padding: 0 32px;
    margin-bottom: -4px;
  }
  @media (max-width: 640px) { .progress-bar-wrap { padding: 0 18px; } }
  .progress-track {
    height: 3px;
    background: #ede9e3;
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--text-hint);
    text-align: right;
  }

  /* === RESULTS PAGE === */
  .results-page {
    display: none;
    padding: 48px 32px;
    text-align: center;
    animation: fadeUp 0.5s ease;
  }
  .results-page.show { display: block; }
  .results-circle {
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 6px solid var(--blue);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 28px;
    position: relative;
    background: var(--blue-light);
  }
  .results-pct {
    font-family: 'Syne', sans-serif;
    font-size: 38px;
    font-weight: 800;
    color: var(--blue);
    line-height: 1;
  }
  .results-pct-label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-top: 2px;
  }
  .results-score {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .results-msg {
    font-size: 14.5px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 360px;
    margin: 0 auto 32px;
  }
  .results-stat {
    background: #f8f6f2;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .results-stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 2px;
  }
  .results-stat-label {
    font-size: 11px;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .stat-green { color: var(--green); }
  .stat-red { color: var(--red); }
  .stat-blue { color: var(--blue); }

  .btn-restart {
    background: var(--text-primary);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 13px 36px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-restart:hover { background: #333; }

  .q-page {
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <h1>Quiz · SGBD Objet Relationnel &amp; SQL3 Oracle</h1>
  <p>80 questions · Sélectionnez vos réponses et confirmez pour voir la correction</p>
</header>

<div class="card" id="mainCard">

  <!-- Nav grid -->
  <div class="nav-grid-wrap">
    <div class="nav-grid-label">Navigation des questions</div>
    <div class="nav-grid" id="navGrid"></div>
  </div>

  <!-- Progress bar -->
  <div style="padding:14px 32px 0" class="progress-bar-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 / 80 confirmées</div>
  </div>

  <!-- Question pages -->
  <div id="quizPages"></div>

  <!-- Results page -->
  <div class="results-page" id="resultsPage">
    <div class="results-circle" id="resultsCircle">
      <div class="results-pct" id="resultsPct">0%</div>
      <div class="results-pct-label">score</div>
    </div>
    <div class="results-score" id="resultsScore"></div>
    <div class="results-msg" id="resultsMsg"></div>
    <div class="results-grid">
      <div class="results-stat"><div class="results-stat-val stat-green" id="statCorrect">0</div><div class="results-stat-label">Correct</div></div>
      <div class="results-stat"><div class="results-stat-val stat-red" id="statWrong">0</div><div class="results-stat-label">Faux</div></div>
      <div class="results-stat"><div class="results-stat-val stat-blue" id="statSkipped">0</div><div class="results-stat-label">Sauté</div></div>
    </div>
    <button class="btn-restart" onclick="restartQuiz()">↺ Recommencer le quiz</button>
  </div>

</div>

<script>
const QUESTIONS = [{"n": 1, "m": false, "q": "Définition d’un Lob Locator interne ?", "c": false, "o": [{"l": "a", "t": "Tableau de pointeurs non indexés. Chacun d’eux pointe vers un objet volumineux", "k": false}, {"l": "b", "t": "Tableau de pointeurs. Chacun d’eux pointe vers un fichier externe contenant un objet volumineux", "k": false}, {"l": "c", "t": "Tableau de pointeurs. Chacun d’eux contient les noms de fichiers contenant les objets volumineux", "k": false}, {"l": "d", "t": "Tableau de pointeurs indexés. Chacun d’eux pointe vers un objet volumineux", "k": true}]}, {"n": 2, "m": true, "q": "Cochez ce qui caractérise au mieux une classe spécialisée", "c": false, "o": [{"l": "a", "t": "Elle doit posséder obligatoirement un champ appelé sql_type contenant le nom du type équivalent Oracle", "k": true}, {"l": "b", "t": "Une classe spécialisée doit avoir obligatoirement le même nom que le type Oracle correspondant", "k": false}, {"l": "c", "t": "Une classe spécialisée peut avoir un nom quelconque. Il existe des mécanismes pour le faire correspondre au type Oracle", "k": true}, {"l": "d", "t": "Le nombre maximum de champs et de méthodes de cette classe est limité à 1000", "k": false}]}, {"n": 3, "m": false, "q": "Cochez ce qui correspond à la syntaxe de création d’une table Objet", "c": true, "o": [{"l": "a", "t": "CREATE TABLE nomTable as select * from uneTableRelationnelle;", "k": false}, {"l": "b", "t": "CREATE TABLE nomTable of nomTypeComplexe (…);", "k": true}, {"l": "c", "t": "CREATE TABLE nomTable as select * from uneTableObjet;", "k": false}, {"l": "d", "t": "CREATE TABLE nomTable ( c1 typeDeC1, C2 typeDeC2, …);", "k": false}]}, {"n": 4, "m": false, "q": "Cochez la bonne traduction de ce lien du schéma conceptuel vers le schéma de type", "c": true, "o": [{"l": "a", "t": "Il sera matérialisé par un champ collection de REF (Type Nested table)", "k": false}, {"l": "b", "t": "Il sera matérialisé par un champ REF", "k": true}, {"l": "c", "t": "Il sera matérialisé par un champ clé étrangère", "k": false}, {"l": "d", "t": "Il sera matérialisé par un champ collection de clés étrangères", "k": false}]}, {"n": 5, "m": true, "q": "Le type REF", "c": true, "o": [{"l": "a", "t": "Permet d’identifier un objet de façon unique pendant sa durée de vie", "k": true}, {"l": "b", "t": "Permet de modéliser le lien d’association de cardinalité 1", "k": true}, {"l": "c", "t": "Permet d’éviter les clés étrangères", "k": true}, {"l": "d", "t": "Permet de modéliser le lien d’association de cardinalité N", "k": false}]}, {"n": 6, "m": true, "q": "Considérons les types PILOTE_T, AVION_T et AVION_T. Considérons les tables O_PILOTE, O_AVION et O_VOL :\ndesc o_pilote;\nNom NULL ? Type\nPL# NOT NULL NUMBER(4)\nPLNOM VARCHAR2(12)\nADRESSE ADRESSE_T\nTELEPHONE VARCHAR2(12)\nDNAISS DATE\nSALAIRE NUMBER(7,2)\nPLISTREFVOLS LISTREFVOLS_T\ndesc o_avion;\nNom NULL ? Type\nAV# NOT NULL NUMBER(3)\nAVTYPE VARCHAR2(12)\nLOCALISATION VARCHAR2(20)\nCAPACITE NUMBER(3)\nREMARQUE CLOB\nALISTREFVOLS LISTREFVOLS_T\ndesc o_vol;\nNom NULL ? Type\nVOL# NOT NULL NUMBER(4)\nVILLEDEPART VARCHAR2(20)\nVILLEARRIVEE VARCHAR2(20)\nREFPILOTE REF OF PILOTE_T\nREFAVION REF OF AVION_T\nSoit la requête suivante : que fait elle\nSELECT CURSOR( SELECT p6.plnom, v.column_value.vol#, v.column_value.villeDepart\nFROM TABLE (p6.pListRefVols) v) FROM o_pilote p6;", "c": true, "o": [{"l": "a", "t": "Sans CURSOR il est impossible d’accéder aux éléments d’une collection", "k": false}, {"l": "b", "t": "Cette requête construit la liste des vols des pilotes Nr 1 ét 2", "k": false}, {"l": "c", "t": "Cette requête renvoie les informations sur chaque pilote et ses vols", "k": true}, {"l": "d", "t": "Cette requête construit la liste des vols de chaque pilote. La liste est vide pour les pilote sans vol", "k": true}]}, {"n": 7, "m": true, "q": "Cochez ce qui permet d’initialiser un lob interne de type NCLOB", "c": true, "o": [{"l": "a", "t": "BFILENAME(directory_alias, filename)", "k": false}, {"l": "b", "t": "EMPTY_CLOB()", "k": true}, {"l": "c", "t": "EMPTY_BLOB()", "k": false}, {"l": "d", "t": "NULL", "k": true}]}, {"n": 8, "m": true, "q": "Cochez ce qui caractérise la clause SCOPE FOR", "c": true, "o": [{"l": "a", "t": "La taille d'une référence limitée via SCOPE FOR vaut 16 Octets. Au lieu de 42 pour un REF normal", "k": true}, {"l": "b", "t": "SCOPE FOR joue pour les tables objets, à peu près le même rôle que FOREIGN KEY pour les tables relationnelles SQL2", "k": true}, {"l": "c", "t": "SCOPE FOR ne s’applique que sur les colonnes de tout type", "k": false}, {"l": "d", "t": "La clause SCOPE permet d’indiquer l’origine (de quelle table) des REF à affecter à une colonne REF", "k": true}]}, {"n": 9, "m": false, "q": "Nous souhaitons créer un index sur une colonne de type REF. Cochez ce qui est juste", "c": true, "o": [{"l": "a", "t": "Il est possible de créer un index sur une colonne de type REF en toute condition", "k": false}, {"l": "b", "t": "La création de l’index doit être précédée de l’application de SCOPE FOR à la colonne REF", "k": true}, {"l": "c", "t": "Il n’est pas possible de créer un index sur une colonne de type REF", "k": false}, {"l": "d", "t": "La création de l’index doit être suivie de l’application de SCOPE FOR à la colonne REF", "k": false}]}, {"n": 10, "m": false, "q": "Cochez-la ou les bonnes définitions d’un CALL OUT", "c": false, "o": [{"l": "a", "t": "Un CALL OUT est la possibilité qui existe sous oracle d’exporter des programmes écrits dans des L3G tels que C, C++, …", "k": false}, {"l": "b", "t": "Un CALL OUT est la possibilité qui existe sous oracle d’exécuter des programmes écrits dans des L3G tels que C, C++, …", "k": true}, {"l": "c", "t": "Pour exécuter du code java il faut obligatoire passer par un CALL OUT", "k": false}, {"l": "d", "t": "Un CALL OUT est la possibilité qui existe sous oracle d’importer des programmes écris dans des L3G tels que C, C++, …", "k": false}]}, {"n": 11, "m": true, "q": "-- Création du type incomplet  true}, {"l": "d", "t": "« stmt » contient les ressources nécessaires pour envoyer des requêtes au moteur Oracle", "k": true}]}, {"n": 29, "m": true, "q": "Cochez ce qui caractérise une référence REF", "c": false, "o": [{"l": "a", "t": "Peux changer pendant la durée de vie d’un objet (ligne dans une table objet)", "k": true}, {"l": "b", "t": "Est une structure avec trois champs (OID vers la table, l’OID vers la ligne et le ROWID vers la,ligne)", "k": true}, {"l": "c", "t": "Ne peux changer pendant la durée de vie d’un objet (ligne dans une table objet)", "k": true}, {"l": "d", "t": "Toutes les affirmations précédentes sont justes", "k": false}]}, {"n": 30, "m": true, "q": "Considérons les types PILOTE_T, AVION_T et AVION_T. Considérons les tables O_PILOTE, O_AVION et O_VOL :\ndesc o_pilote;\nNom NULL ? Type\nPL# NOT NULL NUMBER(4)\nPLNOM VARCHAR2(12)\nADRESSE ADRESSE_T\nTELEPHONE VARCHAR2(12)\nDNAISS DATE\nSALAIRE NUMBER(7,2)\nPLISTREFVOLS LISTREFVOLS_T\ndesc o_avion;\nNom NULL ? Type\nAV# NOT NULL NUMBER(3)\nAVTYPE VARCHAR2(12)\nLOCALISATION VARCHAR2(20)\nCAPACITE NUMBER(3)\nREMARQUE CLOB\nALISTREFVOLS LISTREFVOLS_T\ndesc o_vol;\nNom NULL ? Type\nVOL# NOT NULL NUMBER(4)\nVILLEDEPART VARCHAR2(20)\nVILLEARRIVEE VARCHAR2(20)\nREFPILOTE REF OF PILOTE_T\nREFAVION REF OF AVION_T\nConsidérons les requêtes suivantes :\nR1: INSERT INTO O_PILOTE OP VALUES ( pilote_t(1, ‘ZEMBLA’, adresse_t(1, 'rue des Miracle',6000, 'NICE'), '0622732123', ‘\n01/01/1982 ', 30000.00, listRefVols_t())) returning ref(op) into refPilote1;\nR2: INSERT INTO O_VOL ov\nValues(100, 'Nice', ‘Lyon’, refPilote1, refAvion1) Returning ref(ov) INTO refVol1;\nR3: INSERT INTO TABLE(SELECT p.pListRefVols FROM o_pilote p\nWHERE p.pl# = 1) values (refVol1);\nCochez ce qui est juste", "c": true, "o": [{"l": "a", "t": "La requête R3 ajoute la référence refVol1 dans la table imbriqué table_pListRefVols", "k": true}, {"l": "b", "t": "Non non la requête R3 est mal écrite. Il faut faire : INSERT INTO table_pListRefVols values (refVol1);", "k": false}, {"l": "c", "t": "La requête R3 ajoute la référence refVol1 dans la colonne plistRefVols de la table o_pilote pour le pilote numéro 1", "k": false}, {"l": "d", "t": "Toutes les références vers les vols de chaque pilote sont stockées dans la table table_pListRefVols", "k": true}]}, {"n": 31, "m": true, "q": "Considérons le type COURS_T\nCREATE OR REPLACE TYPE COURS_T AS OBJECT (\nCOURS_ID NUMBER(4),\nLIBELLE VARCHAR2(100),\nRESPONSABLE VARCHAR2(50),\nINTERVENANT VARCHAR2(50))\n/\nConsidérons le type LISTE_DE_COURS_T\nCREATE OR REPLACE TYPE LISTE_DE_COURS_T AS TABLE OF COURS_T;\nConsidérons le type CURSUS_T\nCREATE OR REPLACE TYPE CURSUS_T AS OBJECT (\nCURSUS_ID NUMBER(4),\nTITRE VARCHAR2(50),\nDESCRIPTION VARCHAR2(100),\nLISTECOURS LISTE_DE_COURS_T )\n/\nConsidérons la table O_CURSUS\nCREATE TABLE O_CURSUS OF CURSUS_T(constraint pk_cursus primary key(cursus_id))\nNESTED TABLE LISTECOURS STORE AS storeListeCours;\nCochez ce qui marche", "c": true, "o": [{"l": "a", "t": "insert into o_cursus oc values (6, 'M1MIAGE', 'M1MIAGE', LISTE_DE_COURS_T()); -- Ajoute une collection vide", "k": true}, {"l": "b", "t": "insert into o_cursus oc values (5, 'M2MIAGE MBDS', 'M2MIAGE MBDS',LISTE_DE_COURS_T(COURS_T(101, 'XML', 'Jacobson', 'Smirnoff'), COURS_T(102, 'Java', 'Mc Nelly', 'Buffa'), COURS_T(103, 'SGBDOR', 'Stonebraker', 'Stonebraker'), COURS_T(104, 'SGBDNOSQL', 'Gabriel', 'Gabriel'), COURS_T(105, 'Data lake', 'Ullman', 'Ullman'), COURS_T(106, 'Oracle NoSQL', 'Larry', 'Larry'), COURS_T(107, 'MongoDB', 'Horowitz', 'Horowitz') )); -- Ajoute une collection avec 6 courss", "k": true}, {"l": "c", "t": "La première réponse ne fonctionnement pas du tout", "k": false}, {"l": "d", "t": "insert into o_cursus oc values (4,'L3MIAGE', 'L3MIAGE', LISTE_DE_COURS_T(COURS_T(100, 'SGBDR', 'Codd', 'Date') )); -- Ajoute une collection avec 1 cours", "k": true}]}, {"n": 32, "m": true, "q": "Cochez les fonctions qui permettent d’interagir avec des fichiers", "c": fal end;", "k": false}, {"l": "b", "t": "declare v Vehicule_t:=null; begin null; end;", "k": true}, {"l": "c", "t": "declare v Vehicule_t:=vehicule_t('Garage', 'Voiture'); begin null; end;", "k": false}, {"l": "d", "t": "declare v Vehicule_t; begin null; end;", "k": true}]}, {"n": 36, "m": false, "q": "--Considérons le type adresse_t\nCREATE OR REPLACE TYPE adresse_t as object(\nNumero NUMBER(4),\nRue VARCHAR2(20),\nCode_Postal NUMBER(5),\nVille VARCHAR2(20)\n);\n/\n--Considérons le type pilote4_t\nCREATE OR REPLACE TYPE Pilote4_t AS OBJECT (\nPL# NUMBER(4),\nnom VARCHAR2(12),\nadresse ADRESSE_T,\nTel VARCHAR2(12),\ndnaiss DATE,\nsalaire NUMBER(7,2));\n--Considérons la table o_pilote4\nCREATE TABLE o_pilote4 OF pilote4_t;\n--Considérons des lignes insérées dans la table o_pilote4\n--Que fait la requête suivante\nSELECT VALUE(op) FROM O_PILOTE4 op;", "c": true, "o": [{"l": "a", "t": "Aucune des actions précédentes ne fonctionne", "k": false}, {"l": "b", "t": "Cette requête renvoie les valeurs (pl#, plnom, …) des pilotes insérés dans la table O_PILOTE4", "k": false}, {"l": "c", "t": "Cette requête renvoie les instances (pilote4_t(…)) des pilotes insérés dans la table O_PILOTE4", "k": true}, {"l": "d", "t": "Cette requête renvoie les références vers les pilotes insérés dans la table O_PILOTE4", "k": false}]}, {"n": 37, "m": false, "q": "Cochez ce qui est possible", "c": false, "o": [{"l": "a", "t": "DECLARE TYPE ListeDeNombres_t IS TABLE OF NUMBER; BEGIN null; END;", "k": true}, {"l": "b", "t": "BEGIN TYPE ListeDeNombres_t IS TABLE OF NUMBER; END;", "k": false}, {"l": "c", "t": "BEGIN CREATE OR REPLACE Employe2_t as object (empno number(4), …); END;", "k": false}, {"l": "d", "t": "DECLARE CREATE OR REPLACE Employe2_t as object (empno number(4), …); BEGIN null; END;", "k": false}]}, {"n": 38, "m": false, "q": "Question 25 :\nCochez ce qui caractérise le mieux un type Nested table", "c": true, "o": [{"l": "a", "t": "Un type Nested table est une collection pour laquelle les éléments sont ordonnés", "k": false}, {"l": "b", "t": "Un type Nested table est une collection pour laquelle le nombre maximum d’éléments n’est pas illimité", "k": true}, {"l": "c", "t": "Une collection de type Nested table ne peut contenir des éléments de type Nested table ou Varray", "k": false}, {"l": "d", "t": "Un type Nested table est une collection pour laquelle le nombre maximum d’éléments est illimité", "k": false}]}, {"n": 39, "m": true, "q": "Cochez ce qui est vrai par rapport à cette séquence de code de la classe spécialisée java Artiste\npublic void displayArprenoms() throws SQLException{\nString [] lesArprenoms= ( String [])this.getArprenoms().getArray();\nfor (int i=0; i❮lesArprenoms.length;i++){\nSystem.out.println(\"Prenoms[\"+i+\"]=\"+lesArprenoms[i]);\n}\n}", "c": false, "o": [{"l": "a", "t": "« lesArprenoms » c’est un tableau de chaines de caractères", "k": true}, {"l": "b", "t": "«lesArprenoms[i] » contient un prénom", "k": true}, {"l": "c", "t": "la fonction «displayArprenoms» affiche les informations sur une collection de type Varray", "k": true}, {"l": "d", "t": "la fonction «displayArprenoms» affiche les informations sur une collection de type Nested Table", "k": false}]}, {"n": 40, "m": false, "q": "Pour parcourir une collection en PLSQL on peut faire:\nBEGIN For i in COL1.FIRST .. COL1.LAST LOOP … END LOOP; END;\nCochez ce qui caractérise une table objet", "c": true, "o": [{"l": "a", "t": "Les lignes d’une table objet sont identifiées par ROWID (identifiant physique Oracle)", "k": false}, {"l": "b", "t": "Une table objet ne peut contenir des colonnes définies sur un type scalaire (char, varchar2, date, etc.)", "k": false}, {"l": "c", "t": "Les lignes d’une table objet sont identifiées par des OID (Object Identifier) et des rowid", "k": true}, {"l": "d", "t": "Une table objet ne peut contenir des colonnes définies sur un type complexe (Type Abstrait de Données : TAD ou TDA)", "k": false}]}, {"n": 41, "m": true, "q": "Soit le type suivant créé :\ncreate or replace type employe_t as object(\nempno number(4),\nename varchar2(20),\nmap member function match return varchar2\n)\n/\ncreate or replace type BODY employe_t as\nmap member function match return varchar2 is\nBegin\nreturn ename || empno;\nEnd;\nend;\n/\nCochez ce qui est juste", "c": true, "o": [{"l": "a", "t": "Declare paul employe_t:=employe_t(1, 'Paul'); pierre employe_t:=employe_t(2, 'Pierre'); BEGIN if paul = pierre then dbms_output.put_line('Paul est égal à Pierre'); end if; END;", "k": true}, {"l": "b", "t": "Declare paul employe_t:=employe_t(1, 'Paul'); pierre employe_t:=employe_t(2, 'Pierre'); BEGIN if paul > pierre then dbms_output.put_line('Paul est plus grand que Pierre'); end if; END;", "k": true}, {"l": "c", "t": "Aucune des réponses précédentes n’est vrai", "k": false}, {"l": "d", "t": "Declare paul employe_t:=employe_t(1, 'Paul'); pierre employe_t:=employe_t(2, 'Pierre'); BEGIN if paul ❮= pierre then dbms_output.put_line('Paul est inférieur ou égal à Pierre'); end if; END;", "k": true}]}, {"n": 42, "m": false, "q": "-- Création du type incomplet cursus_t\nCREATE OR REPLACE TYPE cursus_t;\n/\n-- Création du type COURS_T\nCREATE OR REPLACE TYPE COURS_T AS OBJECT (\nCOURS_ID NUMBER(4),\nLIBELLE VARCHAR2(100),\nRESPONSABLE VARCHAR2(50),\nINTERVENANT VARCHAR2(50),\nrefCursus REF cursus_t)\n/\n-- Création du type collection de REF vers les cours\nCREATE OR REPLACE TYPE LISTE_REF_DE_COURS_T\nAS TABLE OF REF COURS_T\n/\n-- Création du type cursus_t\nCREATE OR REPLACE TYPE CURSUS_T AS OBJECT (\nCURSUS_ID NUMBER(4),\nTITRE VARCHAR2(50),\nDESCRIPTION VARCHAR2(100),\nListRefCours LISTE_REF_DE_COURS_T )\n/\n-- Création de la table O_CURSUS\nCREATE TABLE O_CURSUS OF CURSUS_T(\nconstraint pk_cursus_cursus_id primary key(cursus_id)\n)\nNESTED TABLE listRefCours STORE AS storeListRefCours;\n-- Création de la table O_COURS\nCREATE TABLE O_COURS OF COURS_T(\nconstraint pk_cours_cours_id primary key(cours_id));\ndesc o_cursus\nNom NULL ? Type\nCURSUS_ID NOT NULL NUMBER(4)\nTITRE VARCHAR2(50)\nDESCRIPTION VARCHAR2(100)\nLISTREFCOURS LISTE_REF_DE_COURS_T\ndesc storeListRefCours\nNom NULL ? Type\nCOLUMN_VALUE REF OF COURS_T\nNom NULL ? Type\nCOURS_ID NOT NULL NUMBER(4)\nLIBELLE VARCHAR2(100)\nRESPONSABLE VARCHAR2(50)\nINTERVENANT VARCHAR2(50)\nREFCURSUS REF OF CURSUS_T\nConsidérons des cours et des cursus liés.\nConsidérons la table storeListRefCours cette table contient une colonne par défaut appelée COLUMN_VALUE et une colonne implicite\nappelée NESTED_TABLE_ID. Nous souhaitons consulter les données contenues dans storeListRefCours. Cochez ce qui est permet d’afficher\nles références vers les cours du cursus nr 1", "c": true, "o": [{"l": "a", "t": "SELECT lrc.column_value.libelle, lrc.column_value.intervenant FROM TABLE(SELECT listRefCours FROM o_cursus oc WHERE oc.cursus_id=1) lrc;", "k": false}, {"l": "b", "t": "SELECT lrc.column_value FROM TABLE(SELECT listRefCours FROM o_cursus oc WHERE oc.cursus_id=1) lrc;", "k": true}, {"l": "c", "t": "SELECT column_value FROM storeListRefCours;", "k": false}, {"l": "d", "t": "SELECT lrc.column_value.cours_id, NESTED_TABLE_ID FROM TABLE(SELECT listRefCours FROM o_cursus oc WHERE oc.cursus_id=1) lrc;", "k": false}]}, {"n": 43, "m": false, "q": "--Considérons les tables relationnelles suivantes\ncreate table employe (\nempno number(4) primary key,\nnom varchar(30)\n);\ninsert into employe values(1, 'King');\ninsert into employe values(2, 'Adams');\ncreate table entretiensAnnuel (\nempno number(4) references employe,\nannee varchar2(4),\nappreciation varchar2(100),\nprimary key (empno, annee )\n);\ninsert into entretiensAnnuel values(1, '2010', 'Employe modele');\ninsert into entretiensAnnuel values(1, '2011', 'Employe Exceptionnel');\ninsert into entretiensAnnuel values(2, '2012', 'Employe en progres');\nConsidérons les types suivants\ncreate or replace type employe_t as object (\nempno number(4),\nnom varchar(30)\n);\n/\ncreate or replace type entretiensAnnuel_t as object (\nempno number(4),\nannee varchar2(4),\nappreciation varchar2(100),\nrefEmp REF employe_t\n);\n/\nConsidérons les vues suivantes\nCREATE OR REPLACE VIEW v_o_employe OF employe_t WITH OBJECT IDENTIFIER (Empno) AS SELECT * FROM employe;\nCREATE OR REPLACE VIEW v_o_entretiensAnnuel of ENTRETIENSANNUEL_T WITH OBJECT IDENTIFIER (empno, annee) AS SELECT\nn1.empno, n1.annee, n1.appreciation,\nmake_ref(v_o_employe, n1.empno ) FROM entretiensAnnuel n1;\nAu vu des tables relationnelles, des types et des vues créés précédemment : cochez ce que fait la requête suivante : SELECT value(oe)\nFROM v_o_employe oe;", "c": true, "o": [{"l": "a", "t": "Cette requête permet d’afficher les valeurs d’étudiants insérées dans la table relationnelle EMPLOYE", "k": false}, {"l": "b", "t": "Cette requête permet d’afficher les instances d’étudiants insérées dans la table relationnelle EMPLOYE", "k": true}, {"l": "c", "t": "Cette requête renvoie une erreur. En effet, il est impossible de manipuler des objets complexes via des vues", "k": false}, {"l": "d", "t": "Cette requête effectue une jointure explicite entre les vues v_o_entretiensAnnuel et v_o_employe", "k": false}]}, {"n": 44, "m": true, "q": "Considérons le type aviont_t\nCREATE TYPE avion_t AS OBJECT(\nAv# NUMBER(4),\nAvType VARCHAR2(45),\nLoc VARCHAR2(20),\nCap NUMBER(4));\n/\nConsidérons le varray TAB_AVIONS_T\nCREATE OR REPLACE TYPE TAB_AVIONS_T AS VARRAY (5) OF avion_t\n/\nConsidérons la table HANGAR avec une colonne avions de type TAB_AVIONS_T\nCREATE TABLE HANGAR (hangar# NUMBER(2), avions TAB_AVIONS_T );\nCochez ce qui marche", "c": true, "o": [{"l": "a", "t": "insert into hangar h values (7, null); -- Initialise la collection à NULL", "k": true}, {"l": "b", "t": "insert into hangar h values (6, TAB_AVIONS_T()); -- Ajoute une collection vide", "k": true}, {"l": "c", "t": "insert into hangar h values (4, TAB_AVIONS_T(avion_t(10, 'AIRBUS', 'NICE’,500) )); -- Ajoute une collection avec 1 avion", "k": true}, {"l": "d", "t": "insert into hangar h values (5, TAB_AVIONS_T(avion_t(11, 'AIRBUS', 'NICE’,500), avion_t(12, 'AIRBUS', 'NICE’,500), avion_t(13, 'AIRBUS', 'NICE’,500), avion_t(14, 'AIRBUS', 'NICE’,500), avion_t(15, 'AIRBUS', 'NICE’,500), avion_t(16, 'AIRBUS', 'NICE’,500), avion_t(17, 'AIRBUS', 'NICE’,500) )); -- Ajoute une collection avec 6 avions", "k": false}]}, {"n": 45, "m": true, "q": "Cochez les types de drivers JDBC supportées par Oracle", "c": false, "o": [{"l": "a", "t": "Type 1", "k": false}, {"l": "b", "t": "Type 2", "k": true}, {"l": "c", "t": "Type 4", "k": true}, {"l": "d", "t": "Type 3", "k": false}]}, {"n": 46, "m": true, "q": "Cochez les fonctions faisant partie du package DBMS_LOB", "c": false, "o": [{"l": "a", "t": "DBMS_LOB.LOADBLOBFROMFILE", "k": true}, {"l": "b", "t": "DBMS_LOB.FILEGETNAME", "k": true}, {"l": "c", "t": "DBMS_LOB.LOADCLOBFROMFILE", "k": true}, {"l": "d", "t": "DBMS_LOB.WRITE", "k": false}]}, {"n": 47, "m": true, "q": "create or replace type employe_t as object(\nempno number(4),\nename varchar2(20));\n/\nSupposons que la table relationnelle suivante est créée :\nCreate table r_employe(emp employe_t,\nConstraint pk_r_employe_empno primary key(emp.empno));\nConsidérons la table r_employe. Cochez ce qui fonctionne pour construire un objet de type employe_t", "c": true, "o": [{"l": "a", "t": "insert into r_employe values (employe_t(2, ‘Leroi’));", "k": true}, {"l": "b", "t": "insert into r_employe values (employe_t(3, null));", "k": true}, {"l": "c", "t": "insert into r_employe values (1, ‘King’);", "k": false}, {"l": "d", "t": "insert into r_employe values (employe_t(null, ‘Lechef’));", "k": false}]}, {"n": 48, "m": true, "q": "Cochez ce qui caractérise un LOB interne", "c": false, "o": [{"l": "a", "t": "Pour visualiser les informations sur vos LOB internes il faut consulter entre autre la vue USER_LOBS", "k": true}, {"l": "b", "t": "Le nombre maximum de LOB interne par table est limité à 3000", "k": false}, {"l": "c", "t": ": Une table peut contenir plusieurs e); --L1\n--utl_ref.select_object(refEmp, emp1); --L2\n--dbms_output.put_line('ename='||emp1.ename); --L3\nend;\n/", "c": true, "o": [{"l": "a", "t": "Commentez L1 et décommentez L2 et L3 ça ira", "k": true}, {"l": "b", "t": "refEmp.ename permet effectivement d’accéder au nom de l’étudiant Nr 1", "k": false}, {"l": "c", "t": "Le code PL/SQL ci-dessus ne fonctionne pas. La navigation avec les variables REF n’est pas possible en PLSQL", "k": true}, {"l": "d", "t": "La réponse en ci-dessus ne marche pas, il faut faire deref(refEmp).ename pour accéder au nom de l’étudiant Nr 1", "k": false}]}, {"n": 52, "m": false, "q": "Que faut-il faire pour rendre objet, une table relationnelle appelée tableR", "c": true, "o": [{"l": "a", "t": "Il faut créer un type (par exemple tableR_t) mappant la structure de tableR; puis créer une vue objet comme suit : CREATE VIEW v_o_tableR of tableR_t WITH OBJECT IDENTIFIER(primaryKeyDeTableR) AS as select * from tableR;", "k": true}, {"l": "b", "t": "Il faut juste migrer la table tableR vers l’objet (import/export)", "k": false}, {"l": "c", "t": "Il faut juste faire : CREATE VIEW v_tableR AS SELECT * FROM tableR;", "k": false}, {"l": "d", "t": "Il faut créer un type (par exemple tableR_t) mappant la structure de tableR; puis créer une vue objet comme suit : CREATE or replace VIEW v_o_tableR of tableR_t WITH OBJECT IDENTIFIER DEFAULT AS SELECT * FROM tableR;", "k": false}]}, {"n": 53, "m": false, "q": "Définition d’un Lob Locator externe ?", "c": false, "o": [{"l": "a", "t": "Tableau de pointeurs non indexés. Chacun d’eux pointe vers un objet volumineux", "k": false}, {"l": "b", "t": "Tableau de pointeurs. Chacun d’eux contient les noms de fichiers contenant les objets volumineux", "k": true}, {"l": "c", "t": "Tableau de pointeurs. Chacun d’eux pointe vers un fichier externe contenant un objet volumineux", "k": false}, {"l": "d", "t": "Tableau de pointeurs indexés. Chacun d’eux pointe vers un objet volumineux", "k": false}]}, {"n": 54, "m": fa es informations sur les tableaux d’un artiste", "k": true}]}, {"n": 56, "m": true, "q": "Considérons les types PILOTE_T, AVION_T et AVION_T. Considérons les tables O_PILOTE, O_AVION et O_VOL :\ndesc o_pilote;\nNom NULL ? Type\nPL# NOT NULL NUMBER(4)\nPLNOM VARCHAR2(12)\nADRESSE ADRESSE_T\nTELEPHONE VARCHAR2(12)\nDNAISS DATE\nSALAIRE NUMBER(7,2)\nPLISTREFVOLS LISTREFVOLS_T\ndesc o_avion;\nNom NULL ? Type\nAV# NOT NULL NUMBER(3)\nAVTYPE VARCHAR2(12)\nLOCALISATION VARCHAR2(20)\nCAPACITE NUMBER(3)\nREMARQUE CLOB\nALISTREFVOLS LISTREFVOLS_T\ndesc o_vol;\nNom NULL ? Type\nVOL# NOT NULL NUMBER(4)\nVILLEDEPART VARCHAR2(20)\nVILLEARRIVEE VARCHAR2(20)\nREFPILOTE REF OF PILOTE_T\nREFAVION REF OF AVION_T\nSupposons la requête suivante :\nDELETE FROM PILOTE WHERE PL#=1;\nCaractérisez ce que devient les pointeurs vers le pilote supprimé dans la table O_VOL", "c": true, "o": [{"l": "a", "t": "La première réponse est fausse", "k": true}, {"l": "b", "t": "La deuxième réponse est fausse", "k": false}, {"l": "c", "t": "Ils sont automatique mis à NULL", "k": false}, {"l": "d", "t": "Ils sont IS DANGLING", "k": true}]}, {"n": 57, "m": true, "q": "Cochez ce qui correspond à la syntaxe de création d’une table Relationnelle SQL2", "c": true, "o": [{"l": "a", "t": "CREATE TABLE nomTable as select * from uneTableObjet;", "k": true}, {"l": "b", "t": "CREATE TABLE nomTable of nomTypeComplexe (…);", "k": false}, {"l": "c", "t": "CREATE TABLE nomTable as select * from uneTableRelationnelle;", "k": true}, {"l": "d", "t": "CREATE TABLE nomTable ( c1 typeDeC1, C2 typeDeC2, …);", "k": true}]}, {"n": 58, "m": true, "q": "Que fait la fonction LOADFROMFILE du package DBMS_LOB\nDBMS_LOB.LOADFROMFILE (dest_lob IN OUT NOCOPY BLOB, src_file IN BFILE, amount IN INTEGER, dest_offset IN INTEGER := 1,\nsrc_offset IN INTEGER := 1);", "c": true, "o": [{"l": "a", "t": "Cette fonction permet mettre à jour un CLOB/BLOB dans la base de données", "k": true}, {"l": "b", "t": "Cette fonction permet de recopier le contenu d’un fichier (image, vidéo, texte) du système de fichier vers un CLOB/BLOB dans la base de données", "k": true}, {"l": "c", "t": "Cette fonction ne permet pas de mettre à jour un NCLOB", "k": false}, {"l": "d", "t": "Il est impossible d’indiquer la position à partir de laquelle il faut écrire dans un CLOB/BLOB", "k": false}]}, {"n": 59, "m": true, "q": "Le corps d’un type peut contenir", "c": true, "o": [{"l": "a", "t": "Le corps des méthodes statiques", "k": true}, {"l": "b", "t": "Le corps des méthodes membres", "k": true}, {"l": "c", "t": "La déclaration des exceptions globales au package", "k": false}, {"l": "d", "t": "Le corps des méthodes d’ordre", "k": true}]}, {"n": 60, "m": true, "q": "-- Création du type incomplet cursus_t\nCREATE OR REPLACE TYPE cursus_t;\n/\n-- Création du type COURS_T\nCREATE OR REPLACE TYPE COURS_T AS OBJECT (\nCOURS_ID NUMBER(4),\nLIBELLE VARCHAR2(100),\nRESPONSABLE VARCHAR2(50),\nINTERVENANT VARCHAR2(50),\nrefCursus REF cursus_t)\n/\n-- Création du type collection de REF vers les cours\nCREATE OR REPLACE TYPE LISTE_REF_DE_COURS_T\nAS TABLE OF REF COURS_T\n/\n-- Création du type cursus_t\nCREATE OR REPLACE TYPE CURSUS_T AS OBJECT (\nCURSUS_ID NUMBER(4),\nTITRE VARCHAR2(50),\nDESCRIPTION VARCHAR2(100),\nListRefCours LISTE_REF_DE_COURS_T )\n/\n-- Création de la table O_CURSUS\nCREATE TABLE O_CURSUS OF CURSUS_T(\nconstraint pk_cursus_cursus_id primary key(cursus_id)\n)\nNESTED TABLE listRefCours STORE AS storeListRefCours;\n-- Création de la table O_COURS\nCREATE TABLE O_COURS OF COURS_T(\nconstraint pk_cours_cours_id primary key(cours_id));\nCochez ce qui correspond au rôle de la table storeListRefCours", "c": true, "o": [{"l": "a", "t": "Cette table peut être supprimée avec la commande : DROP TABLE storeListRefCours", "k": false}, {"l": "b", "t": "Cette table contient les instances de cours associées à chaque cursus", "k": false}, {"l": "c", "t": "Cette table contient les pointeurs vers les cours associés à chaque cursus", "k": true otion de type abstraits dynamiques", "k": false}, {"l": "d", "t": "En limitant des colonnes à des types scalaires", "k": false}]}, {"n": 64, "m": true, "q": "-- Création du type incomplet cursus_t\nCREATE OR REPLACE TYPE cursus_t;\n/\n-- Création du type COURS_T\nCREATE OR REPLACE TYPE COURS_T AS OBJECT (\nCOURS_ID NUMBER(4),\nLIBELLE VARCHAR2(100),\nRESPONSABLE VARCHAR2(50),\nINTERVENANT VARCHAR2(50),\nrefCursus REF cursus_t)\n/\n-- Création du type collection de REF vers les cours\nCREATE OR REPLACE TYPE LISTE_REF_DE_COURS_T\nAS TABLE OF REF COURS_T\n/\n-- Création du type cursus_t\nCREATE OR REPLACE TYPE CURSUS_T AS OBJECT (\nCURSUS_ID NUMBER(4),\nTITRE VARCHAR2(50),\nDESCRIPTION VARCHAR2(100),\nListRefCours LISTE_REF_DE_COURS_T )\n/\n-- Création de la table O_CURSUS\nCREATE TABLE O_CURSUS OF CURSUS_T(\nconstraint pk_cursus_cursus_id primary key(cursus_id)\n)\nNESTED TABLE listRefCours STORE AS storeListRefCours;\n-- Création de la table O_COURS\nCREATE TABLE O_COURS OF COURS_T(\nconstraint pk_cours_cours_id primary key(cours_id));\ndesc o_cursus\nNom NULL ? Type\nCURSUS_ID NOT NULL NUMBER(4)\nTITRE VARCHAR2(50)\nDESCRIPTION VARCHAR2(100)\nLISTREFCOURS LISTE_REF_DE_COURS_T\ndesc storeListRefCours\nNom NULL ? Type\nCOLUMN_VALUE REF OF COURS_T\nNom NULL ? Type\nCOURS_ID NOT NULL NUMBER(4)\nLIBELLE VARCHAR2(100)\nRESPONSABLE VARCHAR2(50)\nINTERVENANT VARCHAR2(50)\nREFCURSUS REF OF CURSUS_T\nConsidérons des cours et des cursus liés.\nConsidérons la table storeListRefCours cette table contient une colonne par défaut appelée COLUMN_VALUE et une colonne implicité\nappelée NESTED_TABLE_ID. Cochez ce qui est juste", "c": true, "o": [{"l": "a", "t": "La colonne COLUMN_VALUE permet de mémoriser les instances des cours de chaque cursus", "k": false}, {"l": "b", "t": "La colonne Nested_table_id permet de lier un cursus avec les références vers ses cours", "k": true}, {"l": "c", "t": "storeListRefCours est une table imbriquée dans la table O_CURSUS", "k": true}, {"l": "d", "t" const TOTAL = QUESTIONS.length;

// State
let state = {
  current: 0,
  selections: Array.from({length: TOTAL}, () => new Set()),
  confirmed: Array(TOTAL).fill(false),
  finished: false,
  scores: Array(TOTAL).fill(0)
};

function isCodeText(t) {
  return /\b(SELECT|CREATE|INSERT|TABLE\b|FROM|WHERE|declare|begin|end;|VARRAY|REF\b|column_value|make_ref|nested_table|DEREF|pListRefVols|listRefCours|storeList|BFILENAME|EMPTY_CLOB|EMPTY_BLOB)\b/i.test(t);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderQText(q) {
  if (!q.c) {
    return '<div class="prose-line">' + escapeHtml(q.q).replace(/\n/g, '</div><div class="prose-line">') + '</div>';
  }
  // Mixed: split into prose/code segments smartly
  const lines = q.q.split('\n');
  const CODE_RE = /(?:CREATE|SELECT|INSERT|TABLE|TYPE\b|NUMBER\(|VARCHAR|CLOB|BLOB|BFILE|declare|begin\b|end;|member\s|VARRAY|SCOPE\b|PRIMARY\s|CONSTRAINT|CURSOR\b|REPLACE\s+TYPE|desc\s|NOT\s+NULL|Nom\s+NULL|column_value|nested_table|make_ref|NESTED\b|DEREF|pListRef|listRef|storeList|EMPTY_CLOB|EMPTY_BLOB|BFILENAME|LISTREFVOLS|REFPILOTE|REFAVION|PL#|AV#|VOL#|REF OF|\/|o_pilote|o_avion|o_vol|o_cursus|O_CURSUS|O_COURS|O_VOL)/i;
  const COMMENT_RE = /^\s*--/;
  let html = '';
  let codeBuffer = [];
  const flushCode = () => {
    if (codeBuffer.length) {
      html += '<pre class="code-block">' + escapeHtml(codeBuffer.join('\n')) + '</pre>';
      codeBuffer = [];
    }
  };
  for (const ln of lines) {
    if (CODE_RE.test(ln) || COMMENT_RE.test(ln)) {
      codeBuffer.push(ln);
    } else if (ln.trim() === '' && codeBuffer.length) {
      codeBuffer.push(ln);
    } else {
      // check if next peek into codeBuffer end with blanks — trim trailing blanks
      if (ln.trim() === '' && codeBuffer.length === 0) continue;
      if (codeBuffer.length) {
        // remove trailing blank lines from buffer
        while (codeBuffer.length && codeBuffer[codeBuffer.length-1].trim() === '') codeBuffer.pop();
        flushCode();
      }
      if (ln.trim()) {
        html += '<div class="prose-line">' + escapeHtml(ln.trim()) + '</div>';
      }
    }
  }
  while (codeBuffer.length && codeBuffer[codeBuffer.length-1].trim() === '') codeBuffer.pop();
  flushCode();
  return html;
}

function buildNavGrid() {
  const grid = document.getElementById('navGrid');
  grid.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const chip = document.createElement('div');
    chip.className = 'nav-chip';
    chip.id = 'chip-' + i;
    chip.textContent = i + 1;
    chip.title = 'Question ' + (i + 1);
    chip.addEventListener('click', () => goToQ(i));
    grid.appendChild(chip);
  }
}

function buildPages() {
  const wrap = document.getElementById('quizPages');
  wrap.innerHTML = '';
  QUESTIONS.forEach((q, idx) => {
    const div = document.createElement('div');
    div.id = 'qpage-' + idx;
    div.className = 'q-page';
    div.style.display = 'none';
    div.innerHTML = buildPageHTML(q, idx);
    wrap.appendChild(div);
  });
}

function buildPageHTML(q, idx) {
  const isLast = idx === TOTAL - 1;
  const typeLabel = q.m ? 'Choix multiple' : 'Choix unique';
  const typeTip = q.m ? '(plusieurs réponses possibles)' : '(une seule réponse)';

  let optsHTML = '';
  q.o.forEach(o => {
    const isCode = isCodeText(o.t);
    optsHTML += `<div class="option-item" id="opt-${idx}-${o.l}" data-qi="${idx}" data-l="${o.l}" onclick="toggleOpt(${idx},'${o.l}')">
      <div class="option-letter" id="oletter-${idx}-${o.l}">${o.l.toUpperCase()}</div>
      <div class="option-text${isCode ? ' code-opt' : ''}">${escapeHtml(o.t)}</div>
      <div class="option-icon" id="oicon-${idx}-${o.l}"></div>
    </div>`;
  });

  const confirmBtn = isLast
    ? `<div style="display:flex;gap:8px;flex:1;max-width:320px">
         <button class="btn btn-confirm" id="confirmBtn-${idx}" onclick="confirmAnswer(${idx})" disabled>Confirmer</button>
         <button class="btn btn-validate" id="validateBtn-${idx}" style="display:none" onclick="showResults()">Valider le quiz →</button>
       </div>`
    : `<button class="btn btn-confirm" id="confirmBtn-${idx}" onclick="confirmAnswer(${idx})" disabled>Confirmer</button>`;

  return `
    <div class="q-body">
      <div class="q-header">
        <div class="q-num">Question ${idx + 1} / ${TOTAL}</div>
        <div class="q-type-badge">${typeLabel} ${typeTip}</div>
      </div>
      <div class="q-text">${renderQText(q)}</div>
      <div class="options-list">${optsHTML}</div>
      <div class="feedback-box" id="feedback-${idx}"></div>
    </div>
    <div class="actions-bar">
      ${confirmBtn}
      <div class="nav-btns">
        <button class="btn btn-ghost" onclick="goToQ(${idx-1})" ${idx===0?'disabled':''}>← Précédent</button>
        <button class="btn btn-ghost" id="nextBtn-${idx}" onclick="goToQ(${idx+1})" ${idx===TOTAL-1?'disabled':''}>Suivant →</button>
      </div>
    </div>`;
}

function goToQ(idx) {
  if (idx < 0 || idx >= TOTAL) return;
  // Scroll chip into view
  const chip = document.getElementById('chip-' + idx);
  if (chip) chip.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  const prev = state.current;
  state.current = idx;
  document.getElementById('qpage-' + prev).style.display = 'none';
  document.getElementById('qpage-' + idx).style.display = 'block';
  updateChips();
  updateProgress();
  // Restore selection UI
  restorePageState(idx);
}

function toggleOpt(qi, letter) {
  if (state.confirmed[qi]) return;
  const q = QUESTIONS[qi];
  const sel = state.selections[qi];
  if (q.m) {
    if (sel.has(letter)) sel.delete(letter); else sel.add(letter);
  } else {
    sel.clear(); sel.add(letter);
  }
  updateSelectionUI(qi);
}

function updateSelectionUI(qi) {
  const q = QUESTIONS[qi];
  const sel = state.selections[qi];
  q.o.forEach(o => {
    const el = document.getElementById('opt-' + qi + '-' + o.l);
    if (el) {
      el.classList.toggle('selected', sel.has(o.l));
      document.getElementById('oletter-' + qi + '-' + o.l).style.background = '';
    }
  });
  const confirmBtn = document.getElementById('confirmBtn-' + qi);
  if (confirmBtn) confirmBtn.disabled = sel.size === 0;
}

function confirmAnswer(qi) {
  if (state.confirmed[qi]) return;
  state.confirmed[qi] = true;
  const q = QUESTIONS[qi];
  const sel = state.selections[qi];
  const correctSet = new Set(q.o.filter(o => o.k).map(o => o.l));

  // Score: all correct selected AND no wrong selected
  const selArr = [...sel];
  const isFullCorrect = selArr.length === correctSet.size && selArr.every(l => correctSet.has(l));
  state.scores[qi] = isFullCorrect ? 1 : 0;

  // Update option visuals
  q.o.forEach(o => {
    const el = document.getElementById('opt-' + qi + '-' + o.l);
    const icon = document.getElementById('oicon-' + qi + '-' + o.l);
    if (!el) return;
    el.classList.remove('selected');
    el.classList.add('disabled');
    if (o.k) {
      if (sel.has(o.l)) {
        el.classList.add('correct');
        if (icon) icon.textContent = '✓';
      } else {
        el.classList.add('neutral-correct');
        if (icon) icon.textContent = '✓';
      }
    } else {
      if (sel.has(o.l)) {
        el.classList.add('wrong');
        if (icon) icon.textContent = '✗';
      }
    }
    el.onclick = null;
  });

  // Feedback
  const fb = document.getElementById('feedback-' + qi);
  if (fb) {
    const corrLetters = q.o.filter(o => o.k).map(o => o.l.toUpperCase()).join(', ');
    const symbol = isFullCorrect ? '✓ ' : '✗ ';
    const color = isFullCorrect ? '#1a7a4a' : '#b91c1c';
    fb.innerHTML = `<span style="color:${color};font-weight:600">${symbol}${isFullCorrect ? 'Bonne réponse !' : 'Mauvaise réponse.'}</span><br>
      <span style="color:#6b6860">Réponse${q.m?'s':''} correcte${q.m?'s':''} : <strong style="color:#1a1917">${corrLetters}</strong></span>`;
    fb.classList.add('show');
  }

  const confirmBtn = document.getElementById('confirmBtn-' + qi);
  if (confirmBtn) confirmBtn.disabled = true;

  // On last question, show validate button
  if (qi === TOTAL - 1) {
    const vBtn = document.getElementById('validateBtn-' + qi);
    if (vBtn) vBtn.style.display = 'block';
  }

  updateChips();
  updateProgress();
}

function restorePageState(qi) {
  const q = QUESTIONS[qi];
  if (!state.confirmed[qi]) {
    updateSelectionUI(qi);
    return;
  }
  // Already confirmed — re-apply visuals
  const sel = state.selections[qi];
  const correctSet = new Set(q.o.filter(o => o.k).map(o => o.l));
  q.o.forEach(o => {
    const el = document.getElementById('opt-' + qi + '-' + o.l);
    const icon = document.getElementById('oicon-' + qi + '-' + o.l);
    if (!el) return;
    el.classList.remove('selected');
    el.classList.add('disabled');
    if (o.k) {
      if (sel.has(o.l)) { el.classList.add('correct'); if(icon) icon.textContent='✓'; }
      else { el.classList.add('neutral-correct'); if(icon) icon.textContent='✓'; }
    } else {
      if (sel.has(o.l)) { el.classList.add('wrong'); if(icon) icon.textContent='✗'; }
    }
    el.onclick = null;
  });
  const fb = document.getElementById('feedback-' + qi);
  if (fb) fb.classList.add('show');
  const confirmBtn = document.getElementById('confirmBtn-' + qi);
  if (confirmBtn) confirmBtn.disabled = true;
  if (qi === TOTAL - 1) {
    const vBtn = document.getElementById('validateBtn-' + qi);
    if (vBtn) vBtn.style.display = 'block';
  }
}

function updateChips() {
  for (let i = 0; i < TOTAL; i++) {
    const chip = document.getElementById('chip-' + i);
    if (!chip) continue;
    chip.className = 'nav-chip';
    if (i === state.current) chip.classList.add('active');
    if (state.confirmed[i]) {
      chip.classList.add('confirmed');
      if (state.finished) {
        if (state.scores[i] === 1) chip.classList.add('correct-chip');
        else chip.classList.add('wrong-chip');
      }
    }
  }
}

function updateProgress() {
  const done = state.confirmed.filter(Boolean).length;
  const pct = Math.round(done / TOTAL * 100);
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = done + ' / ' + TOTAL + ' confirmées';
}

function showResults() {
  state.finished = true;
  const totalScore = state.scores.reduce((a,b) => a+b, 0);
  const pct = Math.round(totalScore / TOTAL * 100);
  const correct = state.scores.filter(s => s===1).length;
  const confirmed = state.confirmed.filter(Boolean).length;
  const wrong = confirmed - correct;
  const skipped = TOTAL - confirmed;

  document.getElementById('quizPages').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('resultsPage').classList.add('show');

  document.getElementById('resultsPct').textContent = pct + '%';
  document.getElementById('resultsScore').textContent = totalScore + ' / ' + TOTAL + ' points';
  
  let msg = '';
  if (pct >= 90) msg = 'Excellent ! Vous maîtrisez parfaitement ce sujet.';
  else if (pct >= 70) msg = 'Bien ! Quelques points à revoir pour atteindre la maîtrise complète.';
  else if (pct >= 50) msg = 'Passable. Une révision approfondie est recommandée.';
  else msg = 'Des lacunes importantes. Reprenez le cours depuis le début.';
  document.getElementById('resultsMsg').textContent = msg;

  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statSkipped').textContent = skipped;

  const circle = document.getElementById('resultsCircle');
  const color = pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
  circle.style.borderColor = color;
  circle.style.background = pct >= 70 ? 'var(--green-light)' : pct >= 50 ? '#fff7ed' : 'var(--red-light)';
  document.getElementById('resultsPct').style.color = color;

  updateChips();
}

function restartQuiz() {
  state = {
    current: 0,
    selections: Array.from({length: TOTAL}, () => new Set()),
    confirmed: Array(TOTAL).fill(false),
    finished: false,
    scores: Array(TOTAL).fill(0)
  };
  document.getElementById('quizPages').style.display = '';
  document.getElementById('progressWrap').style.display = '';
  document.getElementById('resultsPage').classList.remove('show');
  buildPages();
  goToQ(0);
}

// Init
buildNavGrid();
buildPages();
document.getElementById('qpage-0').style.display = 'block';
updateChips();
updateProgress();
</script>
</body>
